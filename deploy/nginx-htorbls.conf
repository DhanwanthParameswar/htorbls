# HTOR BLS portfolio demo - isolated vhost (does not modify default or novnc)
server {
    listen 8090;
    listen [::]:8090;
    server_name lms.dhanwanth.com _;

    root /var/www/htorbls;
    index index.php index.html;

    client_max_body_size 10M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }

    location ~ /\. {
        deny all;
    }

    location /images/books/ {
        try_files $uri =404;
    }
}
